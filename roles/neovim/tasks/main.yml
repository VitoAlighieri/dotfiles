---
- name: "Neovim | Checking for Distribution Config: {{ ansible_distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_distribution }}.yml"
  register: neovim_distribution_config

- name: "Neovim | Run OS-specific tasks and configure"
  when: neovim_distribution_config.stat.exists
  block:

    - name: "Neovim | Run Tasks: {{ ansible_distribution }}"
      ansible.builtin.include_tasks: "{{ ansible_distribution }}.yml"

    - name: "Neovim | Configure folder"
      ansible.builtin.file:
        mode: "0755"
        path: "{{ ansible_user_dir }}/.config/neovim"
        state: directory

    - name: "Neovim | Create symlink to role files directory"
      ansible.builtin.file:
        src: "{{ role_path }}/files"
        dest: "{{ ansible_user_dir }}/.config/neovim"
        state: link
        force: true

- name: "Neovim | Invalid Current OS"
  when: not neovim_distribution_config.stat.exists
  ansible.builtin.debug:
    msg: "Neovim won't be installed. Current OS configuration not found ({{ ansible_distribution }})"