---
- name: "Rofi | Checking for Distribution Config: {{ ansible_distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_distribution }}.yml"
  register: rofi_distribution_config

- name: "Rofi | Run OS-specific tasks and configure"
  when: rofi_distribution_config.stat.exists
  block:

    - name: "Rofi | Run Tasks: {{ ansible_distribution }}"
      ansible.builtin.include_tasks: "{{ ansible_distribution }}.yml"

    - name: "Rofi | Configure folder"
      ansible.builtin.file:
        mode: "0755"
        path: "{{ ansible_user_dir }}/.config/rofi"
        state: directory

    - name: "Rofi | Create symlink to role files directory"
      ansible.builtin.file:
        src: "{{ role_path }}/files"
        dest: "{{ ansible_user_dir }}/.config/rofi"
        state: link
        force: true

- name: "Rofi | Invalid Current OS"
  when: not rofi_distribution_config.stat.exists
  ansible.builtin.debug:
    msg: "Rofi won't be installed. Current OS configuration not found ({{ ansible_distribution }})"