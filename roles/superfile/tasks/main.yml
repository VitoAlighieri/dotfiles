---
- name: "Superfile | Checking for Distribution Config: {{ ansible_distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_distribution }}.yml"
  register: superfile_distribution_config

- name: "Superfile | Run OS-specific tasks and configure"
  when: superfile_distribution_config.stat.exists
  block:

    - name: "Supefile | Run Tasks: {{ ansible_distribution }}"
      ansible.builtin.include_tasks: "{{ ansible_distribution }}.yml"

    - name: "Superfile | Configure folder"
      ansible.builtin.file:
        mode: "0755"
        path: "{{ ansible_user_dir }}/.config/superfile"
        state: directory

    - name: "Superfile | Create symlink to role files directory"
      ansible.builtin.file:
        src: "{{ role_path }}/files"
        dest: "{{ ansible_user_dir }}/.config/superfile"
        state: link
        force: true

- name: "Superfile | Invalid Current OS"
  when: not superfile_distribution_config.stat.exists
  ansible.builtin.debug:
    msg: "Superfile won't be installed. Current OS configuration not found ({{ ansible_distribution }})"
